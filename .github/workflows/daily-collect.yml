name: daily-collect

# Full run every day at 09:30 UTC. Can also be triggered manually —
# or by the app's "Add ticker" button — with an optional single ticker,
# which collects only that one (~40s) instead of the whole universe.
on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      ticker:
        description: "Collect a single ticker only (leave empty for a full run)"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r collector/requirements.txt

      - name: Run collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_UA: ${{ secrets.SEC_UA }}
          TICKER: ${{ github.event.inputs.ticker }}
        run: python collector/collector.py
