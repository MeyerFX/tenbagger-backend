name: daily-collect

# Runs every day at 09:30 UTC (after US close the prior day is settled).
# GitHub gives public repos unlimited Actions minutes; private repos get
# 2,000 free minutes/month — this job takes ~2–4 min, so well within free.
on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r collector/requirements.txt

      - name: Run collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_UA: ${{ secrets.SEC_UA }}
        run: python collector/collector.py
